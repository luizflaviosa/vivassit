<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <!-- Background -->
  <rect width="480" height="160" rx="20" fill="#0A0A0A"/>
  <!-- Subtle violet→pink gradient definition -->
  <defs>
    <linearGradient id="grad-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
  </defs>
  <!-- Mark: 3 overlapping squares, gradient outline -->
  <g transform="translate(28, 24)">
    <rect x="4" y="4" width="56" height="56" stroke="url(#grad-b)" stroke-width="2.6" fill="none"/>
    <rect x="38" y="38" width="46" height="46" stroke="url(#grad-b)" stroke-width="2.6" fill="none"/>
    <rect x="70" y="20" width="38" height="38" stroke="url(#grad-b)" stroke-width="2.6" fill="none"/>
  </g>
  <!-- Wordmark with serif italic for elegance -->
  <text x="160" y="86"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="500" letter-spacing="8"
    fill="#FAFAFA">SINGULARE</text>
  <text x="160" y="116"
    font-family="'New York','Times New Roman',Georgia,serif"
    font-style="italic" font-size="14" font-weight="400" letter-spacing="2"
    fill="#A1A1AA">healthcare · IA</text>
</svg>
