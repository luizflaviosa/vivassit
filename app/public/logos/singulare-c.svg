<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <rect width="480" height="160" rx="20" fill="#FAFAF7"/>
  <defs>
    <linearGradient id="grad-c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E56CF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6E56CF" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="grad-c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E56CF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6E56CF" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="grad-c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E56CF" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#6E56CF" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <!-- Mark: 3 overlapping squares, layered transparency (filled, no stroke) -->
  <g transform="translate(24, 22)">
    <rect x="4" y="6" width="58" height="58" rx="8" fill="url(#grad-c1)" stroke="#6E56CF" stroke-opacity="0.35" stroke-width="1.2"/>
    <rect x="40" y="40" width="46" height="46" rx="6" fill="url(#grad-c2)" stroke="#6E56CF" stroke-opacity="0.45" stroke-width="1.2"/>
    <rect x="72" y="22" width="38" height="38" rx="5" fill="url(#grad-c3)" stroke="#6E56CF" stroke-opacity="0.55" stroke-width="1.2"/>
  </g>
  <text x="160" y="92"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="46" font-weight="500" letter-spacing="3"
    fill="#27272A">Singulare</text>
  <text x="162" y="118"
    font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="11" font-weight="600" letter-spacing="6"
    fill="#71717A">CUIDADO · INTELIGENTE</text>
</svg>
