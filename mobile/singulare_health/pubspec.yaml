name: singulare_health
description: "Singulare Health - proxy ROOK que extrai Apple Health e transmite ao servidor Singulare (RPM cardiologico)"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ROOK SDK - Apple Health (engloba core + transmission)
  rook_sdk_apple_health: ^4.0.0

  # Permissoes runtime (motion / health complementares)
  permission_handler: ^11.3.1

  # Info de dispositivo / app (telemetria minima)
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2

  # Persistencia local (estado de consent LGPD)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
