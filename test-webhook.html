<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivassit — Teste de Integração N8N v4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .gradient-btn { background: linear-gradient(135deg, #8B5CF6, #EC4899); }
    .gradient-btn:hover { background: linear-gradient(135deg, #7C3AED, #DB2777); }
    pre { white-space: pre-wrap; word-break: break-all; }
    .badge-ok   { background:#dcfce7; color:#166534; }
    .badge-err  { background:#fee2e2; color:#991b1b; }
    .badge-warn { background:#fef9c3; color:#854d0e; }
    .field-group label { display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.25rem; }
    input, select { width:100%; padding:.5rem .75rem; border:1.5px solid #d1d5db; border-radius:.5rem; font-size:.9rem; transition:border-color .2s; }
    input:focus, select:focus { outline:none; border-color:#8B5CF6; box-shadow:0 0 0 3px rgba(139,92,246,.15); }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-orange-50 min-h-screen py-10">

<div class="max-w-3xl mx-auto px-4 space-y-6">

  <!-- Header -->
  <div class="text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-1">Vivassit — Teste N8N v4</h1>
    <p class="text-gray-500 text-sm">Simula o envio do formulário de onboarding para a API e verifica a integração com o workflow N8N</p>
  </div>

  <!-- Target config -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
      <span class="w-5 h-5 rounded-full bg-blue-100 text-blue-600 text-xs flex items-center justify-center font-bold">1</span>
      Endpoint alvo
    </h2>
    <div class="flex gap-2 items-center">
      <select id="targetMode" onchange="updateTarget()" class="w-48 shrink-0">
        <option value="local">Local (dev)</option>
        <option value="n8n">N8N direto</option>
        <option value="custom">Personalizado</option>
      </select>
      <input type="text" id="targetUrl" value="http://localhost:3000/api/onboarding"
             placeholder="URL do endpoint" class="flex-1" />
    </div>
    <p id="targetHint" class="text-xs text-gray-400 mt-2">
      Testa via <code>/api/onboarding</code> — o mesmo caminho que o formulário usa em produção.
    </p>
  </div>

  <!-- Form data -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
      <span class="w-5 h-5 rounded-full bg-purple-100 text-purple-600 text-xs flex items-center justify-center font-bold">2</span>
      Dados do formulário
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="field-group">
        <label>Nome do Médico</label>
        <input id="doctor_name" value="Dr. João Teste Silva" />
      </div>
      <div class="field-group">
        <label>CRM</label>
        <input id="doctor_crm" value="CRM/SP 123456" />
      </div>
      <div class="field-group">
        <label>Especialidade</label>
        <select id="speciality">
          <option value="cardiologia">Cardiologia</option>
          <option value="dermatologia">Dermatologia</option>
          <option value="pediatria">Pediatria</option>
          <option value="ortopedia">Ortopedia</option>
          <option value="ginecologia">Ginecologia</option>
          <option value="neurologia">Neurologia</option>
        </select>
      </div>
      <div class="field-group">
        <label>Nome da Clínica</label>
        <input id="clinic_name" value="Clínica Teste Webhook" />
      </div>
      <div class="field-group">
        <label>Email Admin</label>
        <input type="email" id="admin_email" value="admin@clinicateste.com.br" />
      </div>
      <div class="field-group">
        <label>
          Telefone
          <span class="font-normal text-gray-400 ml-1">(formato livre — API normaliza para E.164)</span>
        </label>
        <input type="tel" id="real_phone" value="11 99999-9999"
               oninput="previewPhone()" />
        <p class="text-xs mt-1 text-purple-500" id="phonePreview"></p>
      </div>
      <div class="field-group">
        <label>Duração da Consulta</label>
        <select id="consultation_duration">
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="30" selected>30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
      <div class="field-group">
        <label>Tipo de Estabelecimento</label>
        <select id="establishment_type">
          <option value="small_clinic">Clínica Pequena</option>
          <option value="medium_clinic">Clínica Média</option>
          <option value="large_clinic">Clínica Grande</option>
          <option value="hospital">Hospital</option>
          <option value="private_practice">Consultório Particular</option>
        </select>
      </div>
      <div class="field-group md:col-span-2">
        <label>Plano</label>
        <select id="plan_type">
          <option value="basic">Básico</option>
          <option value="professional" selected>Profissional</option>
          <option value="premium">Premium</option>
          <option value="enterprise">Corporativo</option>
        </select>
      </div>
    </div>

    <!-- Qualifications -->
    <div class="mt-4">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Funcionalidades selecionadas</label>
      <div class="flex flex-wrap gap-2" id="quals">
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Telemedicina" class="qual-check"> Telemedicina</label>
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Gestão de Agenda" class="qual-check" checked> Gestão de Agenda</label>
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Faturamento" class="qual-check"> Faturamento</label>
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Cadastro de Pacientes" class="qual-check" checked> Cadastro de Pacientes</label>
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Relatórios Médicos" class="qual-check"> Relatórios Médicos</label>
        <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" value="Integração com Planos" class="qual-check" checked> Integração com Planos</label>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex gap-3 justify-center">
    <button onclick="sendTest()"
            class="gradient-btn text-white font-bold px-8 py-3 rounded-xl shadow-lg transition-all transform hover:scale-105 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Enviar Teste
    </button>
    <button onclick="previewPayload()"
            class="bg-white border-2 border-purple-200 text-purple-700 font-semibold px-6 py-3 rounded-xl hover:border-purple-400 transition-all flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      Ver Payload
    </button>
    <button onclick="clearResult()"
            class="bg-white border-2 border-gray-200 text-gray-500 font-semibold px-4 py-3 rounded-xl hover:border-gray-400 transition-all">
      Limpar
    </button>
  </div>

  <!-- Result -->
  <div id="resultBox" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-semibold text-gray-700 flex items-center gap-2">
        <span class="w-5 h-5 rounded-full bg-green-100 text-green-600 text-xs flex items-center justify-center font-bold">3</span>
        Resultado
      </h2>
      <span id="statusBadge" class="px-3 py-1 rounded-full text-xs font-bold"></span>
    </div>
    <div id="metaLine" class="text-xs text-gray-400 mb-3"></div>
    <pre id="resultContent" class="bg-gray-950 text-green-300 p-4 rounded-xl text-xs leading-relaxed max-h-96 overflow-auto"></pre>
  </div>

</div>

<script>
  // ── helpers ──────────────────────────────────────────────────────────────

  const N8N_URL = 'https://n8n.singulare.org/webhook/vivassit-onboarding-v4';

  function normalizePhoneToE164(phone) {
    const digits = phone.replace(/\D/g, '');
    if (phone.trim().startsWith('+')) return '+' + digits;
    if (digits.startsWith('55') && digits.length >= 12) return '+' + digits;
    return '+55' + digits;
  }

  function buildPayload() {
    const quals = [...document.querySelectorAll('.qual-check:checked')].map(c => c.value);
    const rawPhone = document.getElementById('real_phone').value;
    return {
      doctor_name:           document.getElementById('doctor_name').value,
      doctor_crm:            document.getElementById('doctor_crm').value,
      speciality:            document.getElementById('speciality').value,
      clinic_name:           document.getElementById('clinic_name').value,
      admin_email:           document.getElementById('admin_email').value,
      real_phone:            rawPhone,            // a API normaliza para E.164
      consultation_duration: document.getElementById('consultation_duration').value,
      establishment_type:    document.getElementById('establishment_type').value,
      plan_type:             document.getElementById('plan_type').value,
      qualifications:        quals,
      source:                'vivassit-test-tool',
      user_timezone:         Intl.DateTimeFormat().resolvedOptions().timeZone,
      workflow_version:      '4.0',
      form_completion_time:  42,
    };
  }

  function previewPhone() {
    const raw = document.getElementById('real_phone').value;
    const normalized = normalizePhoneToE164(raw);
    const valid = /^\+\d{10,15}$/.test(normalized);
    document.getElementById('phonePreview').textContent =
      valid ? `E.164: ${normalized} ✓` : `E.164: ${normalized} ⚠ formato inesperado`;
    document.getElementById('phonePreview').className =
      'text-xs mt-1 ' + (valid ? 'text-purple-500' : 'text-red-500');
  }

  function updateTarget() {
    const mode = document.getElementById('targetMode').value;
    const hints = {
      local:  ['http://localhost:3000/api/onboarding', 'Testa via /api/onboarding — mesmo caminho do formulário em produção.'],
      n8n:    [N8N_URL, 'Envia direto para o webhook N8N (sem passar pela API Next.js). CORS pode bloquear — use modo local ou Postman para testes diretos.'],
      custom: ['', 'Cole a URL personalizada no campo acima.'],
    };
    document.getElementById('targetUrl').value = hints[mode][0];
    document.getElementById('targetHint').textContent = hints[mode][1];
  }

  function previewPayload() {
    const payload = buildPayload();
    showResult({ mode: 'preview', payload }, null, null);
  }

  function clearResult() {
    document.getElementById('resultBox').classList.add('hidden');
  }

  function showResult({ mode, payload, response, error }, status, ms) {
    const box = document.getElementById('resultBox');
    const badge = document.getElementById('statusBadge');
    const meta = document.getElementById('metaLine');
    const content = document.getElementById('resultContent');

    box.classList.remove('hidden');

    if (mode === 'preview') {
      badge.textContent = 'PREVIEW';
      badge.className = 'px-3 py-1 rounded-full text-xs font-bold badge-warn';
      meta.textContent = 'Payload que será enviado (sem fazer a requisição)';
      content.textContent = JSON.stringify(payload, null, 2);
      return;
    }

    const ok = status >= 200 && status < 300;
    badge.textContent = ok ? `${status} OK` : `${status} ERRO`;
    badge.className = 'px-3 py-1 rounded-full text-xs font-bold ' + (ok ? 'badge-ok' : 'badge-err');
    meta.textContent = `${ms}ms · ${new Date().toLocaleTimeString('pt-BR')}`;

    if (error) {
      content.textContent = `ERRO DE CONEXÃO\n\n${error}\n\nDicas:\n• O servidor Next.js está rodando? (npm run dev)\n• Endereço correto? (${document.getElementById('targetUrl').value})`;
      return;
    }

    content.textContent =
      '── PAYLOAD ENVIADO ──────────────────────────\n' +
      JSON.stringify(payload, null, 2) +
      '\n\n── RESPOSTA DA API ──────────────────────────\n' +
      JSON.stringify(response, null, 2);
  }

  // ── main ─────────────────────────────────────────────────────────────────

  async function sendTest() {
    const url     = document.getElementById('targetUrl').value.trim();
    const payload = buildPayload();
    const t0      = performance.now();

    showResult({ mode: 'loading', payload }, null, null);
    document.getElementById('resultContent').textContent = '⏳ Aguardando resposta...';
    document.getElementById('statusBadge').textContent = '…';
    document.getElementById('statusBadge').className = 'px-3 py-1 rounded-full text-xs font-bold badge-warn';
    document.getElementById('resultBox').classList.remove('hidden');

    try {
      const res  = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Client-Version': '4.0.0',
          'X-Workflow-Target': 'n8n-v4',
        },
        body: JSON.stringify(payload),
      });

      const ms  = Math.round(performance.now() - t0);
      let json  = null;
      try { json = await res.json(); } catch { json = { raw: await res.text() }; }

      showResult({ mode: 'done', payload, response: json }, res.status, ms);

    } catch (err) {
      const ms = Math.round(performance.now() - t0);
      showResult({ mode: 'error', payload, error: err.message }, 0, ms);
    }
  }

  // init phone preview
  previewPhone();
</script>
</body>
</html>
